name: CI – Analyze & Test

# Runs on every push and PR. Free (Linux runners, no minute cap).
# Catches dumb mistakes before you spend macOS minutes on iOS builds.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  analyze-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: '3.44.0'
          cache: true

      - name: Install packages
        run: flutter pub get

      - name: Format check
        run: dart format --output=none --set-exit-if-changed lib

      - name: Static analysis
        run: flutter analyze

      - name: Run tests
        run: flutter test
