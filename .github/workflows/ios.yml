name: iOS – Build & TestFlight

# Triggers:
#   - manual via the Actions tab ("Run workflow")
#   - on git tags like v0.1.0, v0.2.0 etc.
# Why not on every push? Because macOS minutes cost ~$0.05/min once you
# burn through the ~200 free monthly minutes. Trigger deliberately.
on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build & upload to TestFlight
    runs-on: macos-14  # Apple Silicon, comes with Xcode 16 by default

    steps:
      # ─── Source ──────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ─── Toolchain ──────────────────────────────────────────
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: '3.44.0'
          cache: true

      - name: Show Flutter & Xcode versions
        run: |
          flutter --version
          xcodebuild -version

      # ─── Cache CocoaPods to save ~3 minutes per build ───────
      - name: Cache CocoaPods
        uses: actions/cache@v4
        with:
          path: |
            ios/Pods
            ~/.cocoapods
          key: ${{ runner.os }}-pods-${{ hashFiles('**/Podfile.lock') }}
          restore-keys: ${{ runner.os }}-pods-

      # ─── Dependencies ───────────────────────────────────────
      - name: Get Flutter packages
        run: flutter pub get

      - name: Install CocoaPods
        working-directory: ios
        run: pod install --repo-update

      # ─── Signing setup ──────────────────────────────────────
      # Install the Apple certificate and provisioning profile into a
      # temporary keychain on the runner. Tear it down after the job.
      - name: Install Apple certificate & provisioning profile
        env:
          BUILD_CERTIFICATE_BASE64:   ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD:                ${{ secrets.P12_PASSWORD }}
          PROVISIONING_PROFILE_BASE64: ${{ secrets.PROVISIONING_PROFILE_BASE64 }}
          KEYCHAIN_PASSWORD:           ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          # Paths for the decoded files
          CERT_PATH=$RUNNER_TEMP/build_certificate.p12
          PROFILE_PATH=$RUNNER_TEMP/build_pp.mobileprovision
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db

          # Decode the secrets back into files
          echo -n "$BUILD_CERTIFICATE_BASE64" | base64 --decode -o $CERT_PATH
          echo -n "$PROVISIONING_PROFILE_BASE64" | base64 --decode -o $PROFILE_PATH

          # Make a temporary keychain
          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          # Import the certificate
          security import $CERT_PATH -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH

          # Install the provisioning profile
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp $PROFILE_PATH ~/Library/MobileDevice/Provisioning\ Profiles

      # ─── Build (archive then export) ────────────────────────
      # Flutter's `build ipa` rejects distribution-only certs (it scans
      # for "Developer" in the cert name). Split into two xcodebuild
      # commands to sidestep that, which is what Fastlane does internally.
    

      - name: Archive with xcodebuild
        working-directory: ios
        run: |
          xcodebuild -workspace Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -archivePath $RUNNER_TEMP/Runner.xcarchive \
            EXCLUDED_ARCHS[sdk=iphonesimulator*]=arm64 \
            ONLY_ACTIVE_ARCH=NO \
            archive

      - name: Export IPA
        working-directory: ios
        run: |
          xcodebuild -exportArchive \
            -archivePath $RUNNER_TEMP/Runner.xcarchive \
            -exportPath $RUNNER_TEMP/ipa \
            -exportOptionsPlist ExportOptions.plist

      # ─── Upload to TestFlight via App Store Connect API ─────
      - name: Set up App Store Connect API key
        env:
          ASC_API_KEY_BASE64: ${{ secrets.ASC_API_KEY_BASE64 }}
        run: |
          mkdir -p ~/.appstoreconnect/private_keys
          echo -n "$ASC_API_KEY_BASE64" | base64 --decode -o ~/.appstoreconnect/private_keys/AuthKey_${{ secrets.ASC_API_KEY_ID }}.p8

      - name: Upload to TestFlight
        env:
          ASC_API_KEY_ID:        ${{ secrets.ASC_API_KEY_ID }}
          ASC_API_ISSUER_ID:     ${{ secrets.ASC_API_ISSUER_ID }}
        run: |
          xcrun altool --upload-app \
            --type ios \
            --file $RUNNER_TEMP/ipa/*.ipa \
            --apiKey "$ASC_API_KEY_ID" \
            --apiIssuer "$ASC_API_ISSUER_ID"

      # ─── Cleanup (always runs, even on failure) ─────────────
      - name: Clean up keychain & provisioning profile
        if: ${{ always() }}
        run: |
          security delete-keychain $RUNNER_TEMP/app-signing.keychain-db || true
          rm -f ~/Library/MobileDevice/Provisioning\ Profiles/build_pp.mobileprovision || true

      # ─── Make the IPA downloadable from the Actions run page ─
      - name: Upload IPA artifact
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: traackit-ipa
          path: ${{ runner.temp }}/ipa/*.ipa
          retention-days: 14
