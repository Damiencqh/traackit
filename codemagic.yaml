workflows:
  ios-release:
    name: iOS Release
    max_build_duration: 60
    instance_type: mac_mini_m2

    integrations:
      app_store_connect: Traackit

    environment:
      groups:
        - traackit_signing
      flutter: 3.44.0
      xcode: 16.0
      cocoapods: default

    scripts:
      - name: Install certificate and provisioning profile
        script: |
          # Decode the certificate from base64
          echo "$CM_CERTIFICATE" | base64 --decode > /tmp/certificate.p12

          # Decode and install the provisioning profile
          PROFILE_DIR="$HOME/Library/MobileDevice/Provisioning Profiles"
          mkdir -p "$PROFILE_DIR"
          echo "$CM_PROVISIONING_PROFILE" | base64 --decode > "$PROFILE_DIR/traackit_app_store.mobileprovision"

          # Create keychain and add the certificate
          keychain initialize
          keychain add-certificates --certificate /tmp/certificate.p12 --certificate-password "$CM_CERTIFICATE_PASSWORD"

          # Rewrite Xcode project to use the installed profile
          xcode-project use-profiles

      - name: Get Flutter packages
        script: |
          flutter pub get

      - name: Install CocoaPods dependencies
        script: |
          find . -name "Podfile" -execdir pod install \;

      - name: Flutter build (archive only)
        script: |
          flutter build ios --release \
            --build-name=0.1.0 \
            --build-number=$(($BUILD_NUMBER + 1)) \
            --no-codesign

      - name: Archive with xcodebuild
        script: |
          cd ios
          xcodebuild -workspace Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -archivePath $CM_BUILD_DIR/build/Runner.xcarchive \
            ONLY_ACTIVE_ARCH=NO \
            ARCHS=arm64 \
            EXCLUDED_ARCHS= \
            archive

      - name: Inspect archive architectures
        script: |
          ARCHIVE_DIR=$CM_BUILD_DIR/build/Runner.xcarchive
          echo "=== Listing all binaries in archive ==="
          find "$ARCHIVE_DIR/Products/Applications" -type f | while read file; do
            if file "$file" | grep -q "Mach-O"; then
              echo ""
              echo "Binary: $file"
              lipo -info "$file" 2>/dev/null || echo "  (not a fat binary)"
            fi
          done

      - name: Export IPA
        script: |
          xcodebuild -exportArchive \
            -archivePath $CM_BUILD_DIR/build/Runner.xcarchive \
            -exportPath $CM_BUILD_DIR/build/ipa \
            -exportOptionsPlist /Users/builder/export_options.plist

    artifacts:
      - build/ipa/*.ipa
      - build/Runner.xcarchive

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true