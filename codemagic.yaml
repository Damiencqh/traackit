workflows:
  ios-release:
    name: iOS Release
    max_build_duration: 60
    instance_type: mac_mini_m2

    integrations:
      app_store_connect: Traackit

    environment:
      vars:
        BUNDLE_ID: "com.damien.traackit"
      flutter: 3.44.0
      xcode: 16.4
      cocoapods: default

    scripts:
      - name: Get Flutter packages
        script: |
          flutter pub get

      - name: Install CocoaPods dependencies
        script: |
          find . -name "Podfile" -execdir pod install \;

      - name: Flutter build ipa
        script: |
          flutter build ipa --release \
            --build-name=0.1.0 \
            --build-number=$(($BUILD_NUMBER + 1)) \
            --export-options-plist=$CM_BUILD_DIR/ios/ExportOptions.plist

    artifacts:
      - build/ios/ipa/*.ipa

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true